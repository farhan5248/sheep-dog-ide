name: Publish Sheep Dog IDE Snapshot

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]
    paths:
      - '.github/**'
      - '**/src/**'
      - '**/pom.xml'
      - '**/build.gradle'
      - '**/package.json'
concurrency:
  group: sheep-dog-ide
  cancel-in-progress: false
permissions:
  contents: write
  packages: write

jobs:
  sheep-dog-vscode-plugin:
    uses: farhan5248/sheep-dog-ops/.github/workflows/snapshot-maven.yml@main
    with:
      project: 'sheep-dog-vscode-plugin'
    secrets: inherit

  sheep-dog-eclipse-plugin:
    uses: farhan5248/sheep-dog-ops/.github/workflows/snapshot-maven.yml@main
    with:
      project: 'sheepdogeclipseplugin.parent'
    secrets: inherit

  merge-into-develop:
    needs: [sheep-dog-vscode-plugin, sheep-dog-eclipse-plugin]
    uses: farhan5248/sheep-dog-ops/.github/workflows/merge.yml@main
    with:
      source: 'main'
      target: 'develop'
    secrets: inherit
